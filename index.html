<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Zaino</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1a14">
<style>
  :root{
    --bg:#0f1a14;
    --card:#16241c;
    --accent:#6fbf73;
    --text:#eef5ef;
    --muted:#9db3a3;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,Roboto,Segoe UI,sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  header{
    padding:28px 20px 10px;
    text-align:center;
  }
  header h1{
    margin:0;
    font-size:28px;
    letter-spacing:1px;
  }
  header p{
    margin:6px 0 0;
    color:var(--muted);
    font-size:14px;
  }
  .headerBtns{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-top:10px;
    flex-wrap:wrap;
  }
  #editToggle, #exportBtn{
    background:none; border:1px solid #22352a; color:var(--muted);
    border-radius:10px; padding:6px 14px; font-size:13px;
  }
  #exportBtn{
    border-color:var(--accent);
    color:var(--accent);
  }
  .cat-title{
    max-width:520px;
    margin:26px auto 6px;
    padding:0 20px;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--accent);
    font-weight:700;
  }
  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    padding:0 20px;
    max-width:520px;
    margin:0 auto;
  }
  .tile{
    background:var(--card);
    border:1px solid #22352a;
    border-radius:18px;
    padding:20px 12px;
    text-align:center;
    text-decoration:none;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    min-height:104px;
    justify-content:center;
    transition:transform .1s ease, background .15s ease;
  }
  .tile:active{
    transform:scale(0.96);
    background:#1c2e22;
  }
  .tile.empty{
    border-style:dashed;
    color:var(--muted);
  }
  .tile .icon{ font-size:30px; }
  .tile .label{ font-size:14px; font-weight:600; line-height:1.2; }
  .tile .sub{ font-size:10.5px; color:var(--muted); line-height:1.2; }
  footer{
    text-align:center;
    color:var(--muted);
    font-size:11px;
    padding:30px 20px;
  }
</style>
</head>
<body>

<header>
  <h1>🎒 Zaino</h1>
  <p id="appSubtitle">Al mijn apps in één overzicht</p>
  <div class="headerBtns">
    <button id="editToggle">✏️ Bewerken</button>
    <button id="exportBtn">📤 Exporteren</button>
  </div>
</header>

<div id="allCategories"></div>

<footer id="footerText">Jan den Hollander · vrij en niet-commercieel</footer>

function getLang(){
  return localStorage.getItem('zainoLang') || 'nl';
}

  cicerone:      { icon:'🏺', label:'Cicerone IT',      sub:'Reisgids',                    url:'https://jan-den-hollander.github.io/cicerone-it/' },

  extra13:       { icon:'➕', label:'Nieuw', sub:'Tik op bewerken om aan te vullen', url:'' }
};

let editMode = false;

function loadLinks(){
  try{
    const saved = localStorage.getItem('zainoLinks');
    if(saved) return JSON.parse(saved);
  }catch(e){}
  return DEFAULT_LINKS;
}

function saveLinks(links){
  localStorage.setItem('zainoLinks', JSON.stringify(links));
}

function applyTranslations(){
  const t = TRANSLATIONS[getLang()];
  document.getElementById('appSubtitle').textContent = t.subtitle;
  document.getElementById('editToggle').textContent = editMode ? t.editDone : t.edit;
  document.getElementById('exportBtn').textContent = t.exportBtn;
  document.getElementById('footerText').textContent = t.footer;
}

function renderAll(){
  const links = loadLinks();
  const lang = getLang();
  const t = TRANSLATIONS[lang];
  const container = document.getElementById('allCategories');
  container.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const h2 = document.createElement('div');
    h2.className = 'cat-title';
    h2.textContent = t.cat[cat.key];
    container.appendChild(h2);

    const grid = document.createElement('div');
    grid.className = 'grid';

    cat.ids.forEach(id => {
      if(id === 'taal'){
        const langBtn = document.createElement('button');
        langBtn.className = 'tile';
        langBtn.style.border = '1px solid #22352a';
        langBtn.style.cursor = 'pointer';
        langBtn.innerHTML = `
          <div class="icon">🌐</div>
          <div class="label">${t.langLabel}</div>
          <div class="sub">${t.langSub}</div>
        `;
        langBtn.addEventListener('click', () => {
          const next = LANG_ORDER[(LANG_ORDER.indexOf(getLang()) + 1) % LANG_ORDER.length];
          localStorage.setItem('zainoLang', next);
          applyTranslations();
          renderAll();
        });
        grid.appendChild(langBtn);
        return;
      }

      const link = links[id] || DEFAULT_LINKS[id];
      if(!link) return;

      const isEmpty = !link.url;
      const el = document.createElement(editMode || isEmpty ? 'button' : 'a');
      el.className = 'tile' + (isEmpty && !editMode ? ' empty' : '');
      if(!editMode && !isEmpty){
        el.href = link.url;
        el.target = '_blank';
      } else {
        el.style.cursor = 'pointer';
        if(editMode){ el.style.border = '1px dashed var(--accent)'; }
      }
      el.innerHTML = `
        <div class="icon">${link.icon}</div>
        <div class="label">${link.label}${editMode ? ' ✏️' : ''}</div>
        <div class="sub">${editMode ? (link.url || '(nog geen link)') : link.sub}</div>
      `;
      if(editMode || isEmpty){
        el.addEventListener('click', () => {
          const newLabel = prompt('Naam voor deze tegel:', link.label);
          if(newLabel === null) return;
          const newIcon = prompt('Icoon (emoji):', link.icon) || link.icon;
          const newUrl = prompt('Link (URL):', link.url);
          if(newUrl === null) return;

          const all = loadLinks();
          all[id] = {
            icon: newIcon.trim() || link.icon,
            label: newLabel.trim() || link.label,
            sub: link.sub,
            url: newUrl.trim()
          };
          saveLinks(all);
          renderAll();
        });
      }
      grid.appendChild(el);
    });

    container.appendChild(grid);
  });
}

document.getElementById('editToggle').addEventListener('click', () => {
  editMode = !editMode;
  applyTranslations();
  renderAll();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const t = TRANSLATIONS[getLang()];
  const links = loadLinks();
  const code = 'const DEFAULT_LINKS = ' + JSON.stringify(links, null, 2) + ';';

  const finish = (copied) => {
    if(copied){
      alert(t.exportedMsg);
    } else {
      prompt(t.exportedFallback, code);
    }
  };

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(() => finish(true)).catch(() => finish(false));
  } else {
    finish(false);
  }
});

applyTranslations();
renderAll();
</script>

</body>
</html>
